services:
  mysql:
    image: mysql:8.0
    container_name: transdoo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: transdoo123
      MYSQL_DATABASE: transdoo
    ports:
      - "3306:3306"
    volumes:
      - transdoo-mysql-data:/var/lib/mysql

volumes:
  transdoo-mysql-data:
